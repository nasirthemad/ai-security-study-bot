<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Security+ Study Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="cyber-bg">
      <div class="grid"></div>
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="scanline"></div>
    </div>

    <div class="app-shell">
      <section v-if="!user" class="auth-panel">
        <p class="eyebrow">SECURE ACCESS</p>
        <h2>Sign in to your study account</h2>
        <p class="subtext">
          Save your progress and access your study bot from anywhere.
        </p>

        <div class="auth-form">
          <input v-model="authEmail" type="email" placeholder="Email address" />
          <input v-model="authPassword" type="password" placeholder="Password" />

          <div class="auth-actions">
            <button @click="signUp">Create Account</button>
            <button @click="signIn">Sign In</button>
          </div>

          <p v-if="authMessage" class="auth-message">{{ authMessage }}</p>
        </div>
      </section>

      <template v-else>
        <header class="hero">
          <div>
            <p class="eyebrow">AI SECURITY STUDY PLATFORM</p>
            <h1>Security+ Study Bot</h1>
            <p class="subtext">
              Learn faster with guided explanations, quiz mode, flashcards, and interactive feedback.
            </p>
            <p class="signed-in-as">Signed in as: {{ user.email }}</p>
          </div>

          <div class="top-right-actions">
            <button class="clear-btn" @click="clearChat">Clear Chat</button>
            <button class="clear-btn" @click="signOut">Sign Out</button>
          </div>
        </header>

        <section class="control-bar">
          <label for="mode-select">Mode</label>
          <select id="mode-select" v-model="mode">
            <option value="learn">Learn</option>
            <option value="quiz">Quiz</option>
            <option value="example">Example</option>
            <option value="flashcards">Flashcards</option>
          </select>
        </section>

        <section v-if="user" class="dashboard-grid">
          <div class="stat-card">
            <span>Answered</span>
            <strong>{{ userStats.answered }}</strong>
          </div>
          <div class="stat-card">
            <span>Correct</span>
            <strong>{{ userStats.correct }}</strong>
          </div>
          <div class="stat-card">
            <span>Accuracy</span>
            <strong>{{ accuracyPercent }}%</strong>
          </div>
          <div class="stat-card">
            <span>Missed Left</span>
            <strong>{{ quizSession.reviewQueue.length }}</strong>
          </div>
        </section>

        <section class="study-controls" v-if="user">
  <div class="control-group">
    <label for="mode-select">Mode</label>
    <select id="mode-select" v-model="mode">
      <option value="learn">Learn</option>
      <option value="quiz">Quiz</option>
      <option value="example">Example</option>
      <option value="flashcards">Flashcards</option>
      <option value="test">Test</option>
    </select>
  </div>

  <div class="control-group" v-if="mode === 'quiz'">
    <label for="difficulty-select">Difficulty</label>
    <select id="difficulty-select" v-model="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="control-group" v-if="mode === 'quiz'">
    <label for="domain-select">Domain</label>
    <select id="domain-select" v-model="selectedDomain">
      <option value="any">Any Domain</option>
      <option value="1">Domain 1. General Security Concepts</option>
      <option value="2">Domain 2. Threats, Vulnerabilities, and Mitigations</option>
      <option value="3">Domain 3. Security Architecture</option>
      <option value="4">Domain 4. Security Operations</option>
      <option value="5">Domain 5. Security Program Management and Oversight</option>
    </select>
  </div>

  <div class="control-group" v-if="mode === 'test'">
    <label>Difficulty</label>
    <div class="locked-value">Hard</div>
  </div>

  <div class="control-group" v-if="mode === 'test'">
    <label>Domain</label>
    <div class="locked-value">Random (Domains 1–5)</div>
  </div>
</section>

        <section v-if="mode === 'quiz' || mode === 'test'" class="quiz-session-bar">
          <div class="stat-card">
            <span>Main Progress</span>
            <strong>{{ quizSession.mainAnswered }} / {{ quizSession.totalMainQuestions }}</strong>
          </div>
          <div class="stat-card">
            <span>Review Phase</span>
            <strong>{{ quizSession.isReviewPhase ? 'Yes' : 'No' }}</strong>
          </div>
        </section>

        <section v-if="mode === 'quiz'" class="score-board">
          <div class="stat-card">
            <span>Total</span>
            <strong>{{ quizScore.total }}</strong>
          </div>
          <div class="stat-card">
            <span>Correct</span>
            <strong>{{ quizScore.correct }}</strong>
          </div>
          <div class="stat-card">
            <span>Wrong</span>
            <strong>{{ quizScore.wrong }}</strong>
          </div>
        </section>

        <section v-if="mode === 'quiz' && hasQuizPanel" class="quiz-panel">
          <div class="quiz-panel-header">
  {{ mode === 'test' ? 'Active Test Question' : 'Active Quiz Question' }}
</div>
          <div class="quiz-question">{{ quizState.questionText }}</div>

          <div v-if="quizState.awaitingAnswer" class="quiz-answer-buttons">
            <button
              v-for="choice in quizState.answerChoices"
              :key="choice.letter"
              class="answer-btn"
              @click="handleQuizAnswer(choice.letter)"
            >
              {{ choice.letter }}. {{ choice.text }}
            </button>
          </div>

          <div v-if="quizState.feedback" class="quiz-feedback">
            {{ quizState.feedback }}
          </div>
        </section>

        <section v-if="mode === 'quiz' || mode === 'test'" class="quiz-actions">
  <button @click="startSession">
    {{ mode === 'test' ? 'Start 90-Question Test' : 'Start 15-Question Quiz' }}
  </button>
  <button @click="nextQuestion" :disabled="quizState.awaitingAnswer || !quizSession.started">
    Next Question
  </button>
</section>

        <section class="suggestions">
          <button @click="sendMessage('Explain this simply.')">Explain Simply</button>
          <button @click="sendMessage('Quiz me on Security+.')">Quiz Me</button>
          <button @click="sendMessage('Give me an example.')">Give Example</button>
          <button @click="sendMessage('Go deeper on that.')">Go Deeper</button>
        </section>

        <section class="chat-box">
          <div
            v-for="(item, index) in chatHistory"
            :key="index"
            class="message"
            :class="item.role === 'user' ? 'user' : 'bot'"
          >
            {{ item.content }}
          </div>

          <div v-if="isLoading" class="message bot">Typing...</div>
        </section>

        <section class="input-area">
          <input
            v-model="userInput"
            @keydown.enter="sendMessage()"
            :placeholder="inputPlaceholder"
          />
          <button @click="sendMessage()">Send</button>
        </section>
      </template>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
